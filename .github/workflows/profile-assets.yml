name: Profile Assets

on:
  workflow_dispatch:
  schedule:
    - cron: '17 18 * * *'
  push:
    paths:
      - README.md
      - scripts/generate-profile-assets.mjs
      - .github/workflows/profile-assets.yml

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate animated profile assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROFILE_USERNAME: AJings3c
        run: node scripts/generate-profile-assets.mjs

      - name: Commit updated assets
        run: |
          if git diff --quiet -- assets; then
            echo "No asset changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/languages.svg assets/activity.svg
          git commit -m "Update animated profile assets"
          git push
